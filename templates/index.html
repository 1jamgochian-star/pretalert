<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PretAlert.ro - Monitorizare Prețuri România</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{  --bg:#080b14;--bg2:#0d1120;--bg3:#111827;  --card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);  --orange:#f59e0b;--orange-dark:#d97706;--orange-light:#fcd34d;--orange-glow:rgba(245,158,11,0.25);  --white:#fff;--gray:#94a3b8;--muted:#475569;  --green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;}
        html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;min-height:100vh}
        
        /* MESH BG */
        .mesh-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.1}.b1{width:700px;height:700px;background:radial-gradient(circle,#f59e0b,transparent);top:-200px;left:-200px;animation:b1 18s ease-in-out infinite}.b2{width:500px;height:500px;background:radial-gradient(circle,#8b5cf6,transparent);top:40%;right:-100px;animation:b2 22s ease-in-out infinite}.b3{width:400px;height:400px;background:radial-gradient(circle,#3b82f6,transparent);bottom:10%;left:30%;animation:b3 16s ease-in-out infinite}@keyframes b1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,80px)}}@keyframes b2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,60px)}}@keyframes b3{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-70px)}}.grid-ov{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px}

        /* HEADER */
        header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between}.h-inner{position:absolute;inset:0;background:rgba(8,11,20,.75);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06)}.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;position:relative;z-index:1;cursor:pointer}.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 15px var(--orange-glow)}.logo-text{font-size:1.2rem;font-weight:800;letter-spacing:-.5px}.logo-text span{color:var(--orange)}
        nav{display:flex;align-items:center;gap:2rem;position:relative;z-index:1}nav a{color:var(--gray);text-decoration:none;font-size:.87rem;font-weight:500;transition:color .2s;cursor:pointer}nav a:hover,nav a.active{color:var(--white)}
        .h-right{display:flex;align-items:center;gap:.7rem;position:relative;z-index:1}
        .btn-ghost{padding:.42rem 1rem;background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--gray);border-radius:8px;font-size:.84rem;font-weight:500;cursor:pointer}
        .btn-primary{padding:.42rem 1.1rem;background:linear-gradient(135deg,var(--orange),var(--orange-dark));border:none;color:#000;border-radius:8px;font-size:.84rem;font-weight:700;cursor:pointer;box-shadow:0 2px 12px var(--orange-glow)}

        /* TICKER */
        .ticker-wrap{position:relative;z-index:10;margin-top:64px;background:rgba(245,158,11,.05);border-bottom:1px solid rgba(245,158,11,.1);overflow:hidden;height:34px;display:flex;align-items:center}.ticker-label{flex-shrink:0;padding:0 1rem;background:var(--orange);color:#000;font-size:.68rem;font-weight:800;height:100%;display:flex;align-items:center}.ticker-track{display:flex;animation:ticker 35s linear infinite;white-space:nowrap}@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}.t-item{padding:0 2rem;font-size:.76rem;color:var(--gray)}

        /* PAGE SYSTEM */
        .page{display:none;animation:pageIn .4s ease forwards}.page.active{display:block}@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        
        /* LANDING STYLES */
        .hero{text-align:center;padding:5rem 2rem}.hero h1{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;margin-bottom:1.5rem}.search-wrap{max-width:680px;margin:2rem auto}.search-box{display:flex;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden}.search-box input{flex:1;padding:1rem;background:transparent;border:none;color:#fff;outline:none}.search-btn{padding:0 1.5rem;background:var(--orange);border:none;font-weight:700;cursor:pointer}
        .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.5rem;padding:2rem;max-width:1200px;margin:0 auto}
        .p-card{background:var(--bg2);border:1px solid var(--card-border);padding:1.2rem;border-radius:16px;transition:0.3s;cursor:pointer;backdrop-filter:blur(10px)}.p-card:hover{transform:translateY(-5px);border-color:var(--orange)}.p-img{height:150px;background:var(--bg3);display:flex;justify-content:center;align-items:center;font-size:3.5rem;border-radius:12px;margin-bottom:1rem}.p-price{color:var(--orange);font-weight:800;font-size:1.3rem}

        /* DASHBOARD STYLES */
        .dash-page{max-width:1100px;margin:0 auto;padding:4rem 2rem}.chart-card{background:var(--bg2);padding:2rem;border-radius:20px;border:1px solid var(--card-border);margin-top:2rem}
        canvas{width:100% !important; height: 350px !important;}
    </style>
</head>
<body>

<div class="mesh-bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
</div>
<div class="grid-ov"></div>

<header>
    <div class="h-inner"></div>
    <div class="logo" onclick="showPage('landing')">
        <div class="logo-icon">🔔</div>
        <div class="logo-text">Pret<span>Alert</span><small>.ro</small></div>
    </div>
    <nav>
        <a onclick="showPage('landing')" id="nav-landing" class="active">Acasă</a>
        <a onclick="showPage('dashboard')" id="nav-dashboard">Dashboard</a>
        <a href="#">Magazine</a>
    </nav>
    <div class="h-right">
        <button class="btn-ghost" onclick="showPage('login')">Intră în cont</button>
        <button class="btn-primary" onclick="showPage('login')">Înregistrare</button>
    </div>
</header>

<div class="ticker-wrap">
    <div class="ticker-label">LIVE DEALS</div>
    <div class="ticker-track" id="tickerTrack"></div>
</div>

<main>
    <div class="page active" id="page-landing">
        <section class="hero">
            <h1>Monitorizăm prețurile,<br><span style="color:var(--orange)">Tu economisești bani.</span></h1>
            <div class="search-wrap">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Ce produs cauți astăzi?" onkeyup="handleSearch()">
                    <button class="search-btn">Caută</button>
                </div>
            </div>
        </section>
        <div class="prod-grid" id="productsGrid">
            </div>
    </div>

    <div class="page" id="page-dashboard">
        <div class="dash-page">
            <h1 style="font-size: 2rem;">Panoul tău de control</h1>
            <p style="color: var(--gray);">Vezi istoricul de preț pentru produsele tale favorite.</p>
            
            <div class="chart-card">
                <h3 style="margin-bottom: 1rem;">Evoluție Economii (2026)</h3>
                <canvas id="savingsChart"></canvas>
            </div>
        </div>
    </div>

    <div class="page" id="page-login">
        <div style="text-align:center; padding: 10rem 2rem;">
            <h2>Bine ai revenit!</h2>
            <p style="color:var(--gray); margin: 1rem 0;">Introdu datele pentru a accesa alertele tale.</p>
            <button class="btn-primary" onclick="showPage('dashboard')">Logare de test</button>
        </div>
    </div>
</main>

<script>
    // 1. DATE SIMULATE
    const products = [
        {id: 1, n:'Samsung Galaxy Watch Ultra', p:2156, op:2799, e:'⌚'},
        {id: 2, n:'iPhone 15 Pro Max 256GB', p:5299, op:5999, e:'📱'},
        {id: 3, n:'PlayStation 5 Slim Console', p:2099, op:2299, e:'🎮'},
        {id: 4, n:'Sony WH-1000XM5 Headphones', p:1149, op:1399, e:'🎧'},
        {id: 5, n:'MacBook Air M3 13-inch', p:6799, op:7499, e:'💻'},
        {id: 6, n:'Dyson V15 Detect Vacuum', p:2799, op:3299, e:'🌀'},
        {id: 7, n:'iPad Pro M2 11-inch', p:4100, op:4500, e:'平板'},
        {id: 8, n:'Nintendo Switch OLED', p:1550, op:1800, e:'🕹️'}
    ];

    // 2. NAVIGARE INTRE PAGINI
    function showPage(pageId) {
        // Ascundem toate paginile
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // Afisam pagina ceruta
        document.getElementById('page-' + pageId).classList.add('active');
        
        // Update Meniu Navigare
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        const activeNav = document.getElementById('nav-' + pageId);
        if(activeNav) activeNav.classList.add('active');

        // Daca e dashboard, pornim graficul
        if(pageId === 'dashboard') {
            setTimeout(initDashboardChart, 100); 
        }
        window.scrollTo(0,0);
    }

    // 3. CAUTARE
    function handleSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = products.filter(p => p.n.toLowerCase().includes(val));
        renderProducts(filtered);
    }

    // 4. RENDERING PRODUSE
    function renderProducts(data) {
        const grid = document.getElementById('productsGrid');
        if(!grid) return;
        
        grid.innerHTML = data.map(p => `
            <div class="p-card">
                <div class="p-img">${p.e}</div>
                <p style="font-size:0.8rem; color:var(--muted)">Electronice</p>
                <h3 style="font-size:0.95rem; margin:0.5rem 0">${p.n}</h3>
                <div style="display:flex; align-items:baseline; gap:0.5rem">
                    <span class="p-price">${p.p} Lei</span>
                    <span style="text-decoration:line-through; font-size:0.75rem; color:var(--muted)">${p.op} Lei</span>
                </div>
            </div>
        `).join('');
    }

    // 5. TICKER (BANDA RULANTA)
    function initTicker() {
        const track = document.getElementById('tickerTrack');
        const items = products.map(p => `<span class="t-item">${p.n}: <b style="color:var(--orange)">${p.p} Lei</b></span>`).join('');
        track.innerHTML = items + items; // Dublam pentru scroll infinit
    }

    // 6. GRAFIC DASHBOARD
    let myChart = null;
    function initDashboardChart() {
        const ctx = document.getElementById('savingsChart');
        if(!ctx) return;
        
        if(myChart) myChart.destroy(); // Distrugem chart-ul vechi sa nu dea eroare

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun'],
                datasets: [{
                    label: 'Economii Totale',
                    data: [120, 450, 380, 900, 1200, 1540],
                    borderColor: '#f59e0b',
                    backgroundColor: 'rgba(245, 158, 11, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // INITIALIZARE LA INCARCARE
    window.onload = () => {
        renderProducts(products);
        initTicker();
    };
</script>

</body>
</html>
