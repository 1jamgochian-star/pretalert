<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PretAlert.ro - Monitorizare Prețuri România</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#080b14;--bg2:#0d1120;--bg3:#111827;
            --card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);
            --orange:#f59e0b;--orange-dark:#d97706;--orange-light:#fcd34d;--orange-glow:rgba(245,158,11,0.25);
            --white:#fff;--gray:#94a3b8;--muted:#475569;
            --green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
        }
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;min-height:100vh}

        /* MESH BG & GRID */
        .mesh-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.1}
        .b1{width:700px;height:700px;background:radial-gradient(circle,#f59e0b,transparent);top:-200px;left:-200px;animation:b1 18s ease-in-out infinite}
        .b2{width:500px;height:500px;background:radial-gradient(circle,#8b5cf6,transparent);top:40%;right:-100px;animation:b2 22s ease-in-out infinite}
        .b3{width:400px;height:400px;background:radial-gradient(circle,#3b82f6,transparent);bottom:10%;left:30%;animation:b3 16s ease-in-out infinite}
        @keyframes b1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,80px)}}
        @keyframes b2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,60px)}}
        @keyframes b3{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-70px)}}
        .grid-ov{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px}

        /* HEADER & NAV */
        header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between}
        .h-inner{position:absolute;inset:0;background:rgba(8,11,20,.75);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06)}
        .logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;position:relative;z-index:1;cursor:pointer}
        .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 15px var(--orange-glow)}
        .logo-text{font-size:1.2rem;font-weight:800;letter-spacing:-.5px}
        .logo-text span{color:var(--orange)}
        nav{display:flex;align-items:center;gap:2rem;position:relative;z-index:1}
        nav a{color:var(--gray);text-decoration:none;font-size:.87rem;font-weight:500;transition:color .2s;cursor:pointer}
        nav a:hover,nav a.active{color:var(--white)}
        .h-right{display:flex;align-items:center;gap:.7rem;position:relative;z-index:1}

        /* Butoane */
        .btn-ghost{padding:.42rem 1rem;background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--gray);border-radius:8px;font-size:.84rem;font-weight:500;cursor:pointer}
        .btn-primary{padding:.42rem 1.1rem;background:linear-gradient(135deg,var(--orange),var(--orange-dark));border:none;color:#000;border-radius:8px;font-size:.84rem;font-weight:700;cursor:pointer;box-shadow:0 2px 12px var(--orange-glow)}

        /* TICKER */
        .ticker-wrap{position:relative;z-index:10;margin-top:64px;background:rgba(245,158,11,.05);border-bottom:1px solid rgba(245,158,11,.1);overflow:hidden;height:34px;display:flex;align-items:center}
        .ticker-label{flex-shrink:0;padding:0 1rem;background:var(--orange);color:#000;font-size:.68rem;font-weight:800;height:100%;display:flex;align-items:center}
        .ticker-track{display:flex;animation:ticker 35s linear infinite;white-space:nowrap}
        @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        .t-item{padding:0 2rem;font-size:.76rem;color:var(--gray)}

        /* PAGE SYSTEM */
        .page{display:none;animation:pageIn .4s ease forwards;padding-top:2rem}
        .page.active{display:block}
        @keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        /* HERO & SEARCH */
        .hero{text-align:center;padding:5rem 2rem}
        .search-wrap{max-width:680px;margin:2rem auto}
        .search-box{display:flex;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden}
        .search-box input{flex:1;padding:1rem;background:transparent;border:none;color:#fff;outline:none}
        .search-btn{padding:0 1.5rem;background:var(--orange);border:none;font-weight:700;cursor:pointer}

        /* PRODUSE */
        .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.5rem;padding:2rem}
        .p-card{background:var(--bg2);border:1px solid var(--card-border);padding:1rem;border-radius:16px;transition:0.3s;cursor:pointer}
        .p-card:hover{transform:translateY(-5px);border-color:var(--orange)}
        .p-img{height:150px;background:var(--bg3);display:flex;justify-content:center;align-items:center;font-size:3rem;border-radius:12px;margin-bottom:1rem}
        .p-price{color:var(--orange);font-weight:800;font-size:1.2rem}

        /* DASHBOARD & CHARTS */
        .dash-page{max-width:1200px;margin:0 auto;padding:2rem}
        .chart-card{background:var(--bg2);padding:1.5rem;border-radius:16px;margin-top:2rem}
        canvas{width:100% !important;height:300px !important}

        /* UTILS */
        .hidden{display:none}
    </style>
</head>
<body>

<div class="mesh-bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
</div>
<div class="grid-ov"></div>

<header>
    <div class="h-inner"></div>
    <div class="logo" onclick="showPage('landing')">
        <div class="logo-icon">🔔</div>
        <div class="logo-text">Pret<span>Alert</span><small>.ro</small></div>
    </div>
    <nav>
        <a onclick="showPage('landing')" id="nav-landing" class="active">Acasă</a>
        <a onclick="showPage('dashboard')" id="nav-dashboard">Dashboard</a>
        <a href="#">Magazine</a>
    </nav>
    <div class="h-right">
        <button class="btn-ghost" onclick="showPage('login')">Intră în cont</button>
        <button class="btn-primary" onclick="showPage('login')">Înregistrare</button>
    </div>
</header>

<div class="ticker-wrap">
    <div class="ticker-label">LIVE</div>
    <div class="ticker-track" id="tickerTrack"></div>
</div>

<main>
    <div class="page active" id="page-landing">
        <section class="hero">
            <h1>Găsește cel mai bun preț din <span style="color:var(--orange)">România</span></h1>
            <div class="search-wrap">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Caută iPhone, Samsung, PS5..." onkeyup="handleSearch()">
                    <button class="search-btn">Caută</button>
                </div>
            </div>
        </section>
        <div class="prod-grid" id="productsGrid"></div>
    </div>

    <div class="page" id="page-dashboard">
        <div class="dash-page">
            <h2>Salut, Andrei! 👋</h2>
            <div class="chart-card">
                <h3>Evoluție Economii</h3>
                <canvas id="savingsChart"></canvas>
            </div>
            <div id="activeAlerts" style="margin-top:2rem"></div>
        </div>
    </div>

    <div class="page" id="page-login">
        <div style="text-align:center;padding:5rem">
            <h2>Autentificare</h2>
            <p>Această secțiune este în curs de dezvoltare.</p>
            <button class="btn-primary" onclick="showPage('dashboard')" style="margin-top:1rem">Simulează Login</button>
        </div>
    </div>
</main>

<script>
    const products = [
        {id:1, n:'Samsung Galaxy Watch Ultra', p:2156, op:2799, e:'⌚', cat:'ceas'},
        {id:2, n:'iPhone 15 Pro Max', p:5299, op:5999, e:'📱', cat:'telefon'},
        {id:3, n:'PlayStation 5 Slim', p:2099, op:2299, e:'🎮', cat:'consola'},
        {id:4, n:'Sony WH-1000XM5', p:1149, op:1399, e:'🎧', cat:'audio'},
        {id:5, n:'MacBook Air M3', p:6799, op:7499, e:'💻', cat:'laptop'},
        {id:6, n:'Dyson V15 Detect', p:2799, op:3299, e:'🌀', cat:'aspirator'}
    ];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        const activeNav = document.getElementById('nav-' + pageId);
        if(activeNav) activeNav.classList.add('active');
        if(pageId === 'dashboard') initDashboard();
        window.scrollTo(0,0);
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = products.filter(p => p.n.toLowerCase().includes(query));
        renderProducts(filtered);
    }

    function renderProducts(data) {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = data.map(p => `
            <div class="p-card" onclick="alert('Detalii pentru: ${p.n}')">
                <div class="p-img">${p.e}</div>
                <h3>${p.n}</h3>
                <p class="p-price">${p.p} Lei</p>
                <p style="text-decoration:line-through;font-size:0.8rem;color:var(--muted)">${p.op} Lei</p>
            </div>
        `).join('');
    }

    function initTicker() {
        const track = document.getElementById('tickerTrack');
        const content = products.map(p => `<span class="t-item">${p.n}: <b>${p.p} Lei</b></span>`).join('');
        track.innerHTML = content + content;
    }

    let chartInstance = null;
    function initDashboard() {
        const ctx = document.getElementById('savingsChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Ian', 'Feb', 'Mar', 'Apr', 'Mai'],
                datasets: [{
                    label: 'Economii (Lei)',
                    data: [150, 400, 320, 800, 847],
                    borderColor: '#f59e0b',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(245, 158, 11, 0.1)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = () => {
        renderProducts(products);
        initTicker();
    };
</script>

</body>
</html>
